name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14.6'
        
    - name: Set version from tag
      run: |
        $version = "${{ github.ref_name }}".TrimStart('v')
        Write-Host "Updating version to: $version"
        @"
        `"""Version information - auto-generated during build.`""
        __version__ = `"$version`"
        "@ | Out-File -FilePath "modules\version.py" -Encoding utf8
      shell: pwsh
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build executable
      run: |
        pyinstaller ptaf-tools.spec --clean
        
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: ptaf-tools-windows
        path: dist/ptaf-tools.exe
        if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Set version from tag
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        echo "Updating version to: $VERSION"
        cat > modules/version.py << EOF
        """Version information - auto-generated during build."""
        __version__ = "$VERSION"
        EOF
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build executable
      run: |
        pyinstaller ptaf-tools.spec --clean
        
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: ptaf-tools-linux
        path: dist/ptaf-tools
        if-no-files-found: error

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: ptaf-tools-windows
        path: ./release
        
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: ptaf-tools-linux
        path: ./release
        
    - name: Prepare release files
      run: |
        cd ./release
        zip -r ptaf-tools-windows.zip ptaf-tools.exe
        zip -r ptaf-tools-linux.zip ptaf-tools
        rm ptaf-tools.exe ptaf-tools
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        files: |
          ./release/ptaf-tools-windows.zip
          ./release/ptaf-tools-linux.zip
        generate_release_notes: true
        draft: false
        prerelease: false
