name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14.6'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build executable
      run: |
        pyinstaller ptaf-tools.spec --clean
        
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: ptaf-tools-windows
        path: |
          dist/ptaf-tools.exe
          dist/ptaf-web.exe
        if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build executable
      run: |
        pyinstaller ptaf-tools.spec --clean
        
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: ptaf-tools-linux
        path: |
          dist/ptaf-tools
          dist/ptaf-web
        if-no-files-found: error

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: ptaf-tools-windows
        path: ./release
        
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: ptaf-tools-linux
        path: ./release
        
    - name: Prepare release files
      run: |
        cd ./release
        zip -r ptaf-tools-windows.zip ptaf-tools.exe ptaf-web.exe
        zip -r ptaf-tools-linux.zip ptaf-tools ptaf-web
        rm ptaf-tools.exe ptaf-web.exe ptaf-tools ptaf-web
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./release/ptaf-tools-windows.zip
          ./release/ptaf-tools-linux.zip
        generate_release_notes: true
        draft: false
        prerelease: false
