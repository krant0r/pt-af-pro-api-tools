name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14.6'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build executable
      run: |
        pyinstaller ptaf-tools.spec --clean
        
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: ptaf-tools-windows
        path: dist/ptaf-tools.exe
        if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build executable
      run: |
        pyinstaller ptaf-tools.spec --clean
        
    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: ptaf-tools-linux
        path: dist/ptaf-tools
        if-no-files-found: error

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    
    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: ptaf-tools-windows
        path: ./release
        
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: ptaf-tools-linux
        path: ./release
        
    - name: Prepare release files
      run: |
        cd ./release
        zip -r ptaf-tools-windows.zip ptaf-tools.exe
        zip -r ptaf-tools-linux.zip ptaf-tools
        rm ptaf-tools.exe ptaf-tools
        
    - name: Determine version
      id: version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
        fi
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.version }}
        files: |
          ./release/ptaf-tools-windows.zip
          ./release/ptaf-tools-linux.zip
        generate_release_notes: true
        draft: false
        prerelease: false
